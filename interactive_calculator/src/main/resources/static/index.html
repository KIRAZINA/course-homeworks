<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="calculator" aria-label="Interactive calculator">
            <div class="display" aria-live="polite">
                <div class="expression" id="expressionDisplay">0</div>
                <div class="result" id="resultDisplay">Ready</div>
            </div>

            <div class="keypad">
                <button class="key utility" type="button" data-action="clear">C</button>
                <button class="key utility wide" type="button" data-action="backspace">Backspace</button>
                <button class="key operator" type="button" data-value="/">/</button>

                <button class="key" type="button" data-value="7">7</button>
                <button class="key" type="button" data-value="8">8</button>
                <button class="key" type="button" data-value="9">9</button>
                <button class="key operator" type="button" data-value="*">*</button>

                <button class="key" type="button" data-value="4">4</button>
                <button class="key" type="button" data-value="5">5</button>
                <button class="key" type="button" data-value="6">6</button>
                <button class="key operator" type="button" data-value="-">-</button>

                <button class="key" type="button" data-value="1">1</button>
                <button class="key" type="button" data-value="2">2</button>
                <button class="key" type="button" data-value="3">3</button>
                <button class="key operator" type="button" data-value="+">+</button>

                <button class="key zero" type="button" data-value="0">0</button>
                <button class="key" type="button" data-value=".">.</button>
                <button class="key equals" type="button" data-action="calculate">=</button>
            </div>
        </section>

        <aside class="history-panel" aria-label="Calculation history">
            <div class="history-header">
                <h1>Calculator</h1>
                <span></span>
            </div>
            <ol class="history-list" id="historyList">
                <li class="empty">No calculations yet</li>
            </ol>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
